{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="card">
    <div class="card-title" style="text-align:center;">📝 Регистрация</div>
    <form method="POST" action="/register" novalidate>
      <div class="form-group">
        <label for="u">Логин <span style="color:#94a3b8;font-weight:400">(мин. 3 символа)</span></label>
        <input class="input" type="text" name="username" id="u"
               placeholder="Придумайте логин" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="p">Пароль <span style="color:#94a3b8;font-weight:400">(мин. 8 символов)</span></label>
        <input class="input" type="password" name="password" id="p"
               placeholder="Придумайте пароль" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-blue" style="width:100%;padding:.6rem;">Зарегистрироваться</button>
    </form>
    <p class="auth-footer">Уже есть аккаунт? <a href="/login">Войти</a></p>
  </div>
</div>
{% endblock %}
