<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Файловый менеджер{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; color: #2d2d2d; min-height: 100vh; }

        /* nav */
        nav { background: #1e293b; color: #fff; padding: 0 2rem; height: 54px;
              display: flex; align-items: center; gap: 1rem; }
        nav .brand { color: #fff; text-decoration: none; font-weight: 700; font-size: 1rem; letter-spacing: .3px; }
        nav .spacer { flex: 1; }
        nav .nav-user { color: #94a3b8; font-size: .85rem; }
        nav a.nav-btn { color: #cbd5e1; font-size: .85rem; text-decoration: none;
                        padding: .3rem .75rem; border-radius: 4px; border: 1px solid #334155; transition: all .15s; }
        nav a.nav-btn:hover { background: #334155; color: #fff; }

        /* layout */
        .page { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }

        /* alerts */
        .alert { padding: .7rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: .88rem; }
        .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .alert-error   { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        /* card */
        .card { background: #fff; border-radius: 10px; padding: 1.5rem;
                box-shadow: 0 1px 8px rgba(0,0,0,.07); margin-bottom: 1.5rem; }
        .card-title { font-size: .9rem; font-weight: 600; color: #475569;
                      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 1rem; }

        /* buttons */
        .btn { display: inline-block; padding: .42rem .9rem; border: none; border-radius: 5px;
               cursor: pointer; font-size: .83rem; font-family: inherit; text-decoration: none;
               transition: background .15s; }
        .btn-blue   { background: #3b82f6; color: #fff; } .btn-blue:hover   { background: #2563eb; }
        .btn-green  { background: #22c55e; color: #fff; } .btn-green:hover  { background: #16a34a; }
        .btn-red    { background: #ef4444; color: #fff; } .btn-red:hover    { background: #dc2626; }
        .btn-ghost  { background: transparent; color: #64748b; border: 1px solid #e2e8f0; }
        .btn-ghost:hover { background: #f1f5f9; }

        /* table */
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: .65rem 1rem; text-align: left; border-bottom: 1px solid #f1f5f9; font-size: .87rem; }
        th { font-size: .76rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px;
             background: #f8fafc; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }
        .td-actions { white-space: nowrap; display: flex; gap: .4rem; }
        .td-actions form { margin: 0; }

        /* badge */
        .badge { display: inline-block; padding: .15rem .55rem; background: #f1f5f9;
                 color: #64748b; border-radius: 20px; font-size: .75rem; }

        /* form */
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: .85rem; font-weight: 500;
                            color: #475569; margin-bottom: .35rem; }
        .input { width: 100%; padding: .55rem .8rem; border: 1px solid #e2e8f0; border-radius: 6px;
                 font-size: .9rem; font-family: inherit; transition: border-color .15s; }
        .input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
        .checkbox-row { display: flex; align-items: center; gap: .5rem; margin-bottom: 1rem; }
        .checkbox-row input { width: auto; cursor: pointer; }
        .checkbox-row label { margin: 0; font-weight: 400; color: #64748b; cursor: pointer; }
        .form-upload { display: flex; gap: .75rem; align-items: center; flex-wrap: wrap; }

        /* empty state */
        .empty { text-align: center; padding: 2.5rem 1rem; color: #94a3b8; font-size: .88rem; }

        /* auth card */
        .auth-wrap { max-width: 400px; margin: 3rem auto; }
        .auth-footer { text-align: center; margin-top: 1rem; font-size: .83rem; color: #94a3b8; }
        .auth-footer a { color: #3b82f6; text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<nav>
    <a class="brand" href="/">📁 Файловый менеджер</a>
    <div class="spacer"></div>
    {% block nav_extra %}{% endblock %}
</nav>

<div class="page">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
</div>

</body>
</html>
